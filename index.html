<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchy Notes</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: #bb86fc; margin-top: 0; }
        textarea { width: 100%; box-sizing: border-box; background: #2c2c2c; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; margin: 15px 0; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-connect { background: #bb86fc; color: #000; }
        .btn-send { background: #03dac6; color: #000; }
        .btn-delete { background: transparent; color: #cf6679; border: 1px solid #cf6679; }
        button:active { transform: scale(0.98); }
        #status { font-size: 12px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Watchy Sync</h2>
        <div id="status">Status: Disconnected ⚪</div>
        <button class="btn-connect" id="connectBtn" onclick="connect()">Connect Watch</button>
        <textarea id="noteInput" rows="4" placeholder="Type a note..."></textarea>
        <button class="btn-send" onclick="sendNote()">Push to Watch</button>
        <button class="btn-delete" onclick="clearNotes()">Factory Reset Notes</button>
    </div>
    <script>
        let port, writer;
        async function connect() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                writer = port.writable.getWriter();
                document.getElementById('status').innerText = "Status: Connected 🟢";
                document.getElementById('connectBtn').style.display = "none";
            } catch(e) { alert("Serial error: " + e); }
        }
        async function sendNote() {
            const val = document.getElementById('noteInput').value.trim();
            if (!writer || !val) return;
            const data = new TextEncoder().encode(`WRITE:${val}\n`);
            await writer.write(data);
            document.getElementById('noteInput').value = "";
            alert("Sent to Watchy!");
        }
        async function clearNotes() {
            if (!writer || !confirm("Delete ALL notes on watch?")) return;
            await writer.write(new TextEncoder().encode("DELETE_ALL:\n"));
            alert("Watchy Cleared.");
        }
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
