<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchy Ultimate Control</title>
    <style>
        :root { --primary: #bb86fc; --bg: #000; --card: #121212; --text: #e0e0e0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 450px; margin: auto; line-height: 1.5; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        .status-box { text-align: center; margin-bottom: 20px; font-size: 0.8rem; font-weight: bold; padding: 8px; border-radius: 20px; background: #1a1a1a; }
        .card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        button { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        button:active { transform: scale(0.97); opacity: 0.8; }
        textarea { width: 100%; height: 80px; background: #222; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 12px; box-sizing: border-box; resize: none; }
        input[type="file"] { margin: 10px 0; font-size: 0.8rem; }
        #log { font-family: monospace; font-size: 0.7rem; color: #03dac6; background: #080808; padding: 10px; border-radius: 10px; height: 80px; overflow-y: auto; border: 1px solid #222; }
        .danger { background: #cf6679; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>⌚ Watchy Ultimate</h2>
    <div id="status" class="status-box" style="color: #ff4444;">DISCONNECTED</div>
    
    <button onclick="connectBLE()" style="background: #03dac6;">🔌 CONNECT BLUETOOTH</button>

    <div class="card">
        <h3>🕒 Time Sync</h3>
        <p style="font-size: 0.75rem; color: #888;">Sets watch to: <span id="localTime"></span></p>
        <button onclick="syncTime()">SYNC CLOCK</button>
    </div>

    <div class="card">
        <h3>📝 Note Manager</h3>
        <textarea id="noteInput" placeholder="Type your note here..."></textarea>
        <button onclick="sendNote()">UPDATE NOTE</button>
        <button class="danger" onclick="sendData('NOTE: ')">CLEAR ALL</button>
    </div>

    <div class="card">
        <h3>🖼️ Image Upload</h3>
        <p style="font-size: 0.75rem; color: #888;">Auto-scales to 200x200 B&W</p>
        <input type="file" id="imgPicker" accept="image/*">
        <button style="background: #ffa000;" onclick="uploadImage()">FLASH IMAGE</button>
    </div>

    <div id="log">System ready.</div>
    <canvas id="canvas" width="200" height="200" style="display:none;"></canvas>

    <script>
        let char;
        const S_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const C_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const log = (m) => { 
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        };

        // Display local time for user reference
        setInterval(() => {
            document.getElementById('localTime').innerText = new Date().toLocaleTimeString();
        }, 1000);

        async function connectBLE() {
            try {
                log("Requesting device...");
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Watchy_Ultimate' }],
                    optionalServices: [S_UUID]
                });
                log("Connecting to GATT...");
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(S_UUID);
                char = await service.getCharacteristic(C_UUID);
                
                document.getElementById('status').innerText = "✅ CONNECTED";
                document.getElementById('status').style.color = "#03dac6";
                log("Watchy Ready.");
            } catch (e) { log("Error: " + e.message); }
        }

        async function sendData(data) {
            if (!char) return log("Error: Not connected!");
            try {
                const buffer = typeof data === 'string' ? new TextEncoder().encode(data) : data;
                await char.writeValue(buffer);
                log("Data packet sent.");
            } catch (e) { log("Send failed: " + e.message); }
        }

        function syncTime() {
            const unixTime = Math.floor(Date.now() / 1000);
            sendData("TIME:" + unixTime);
            log("Time sync triggered.");
        }

        function sendNote() {
            const text = document.getElementById('noteInput').value;
            sendData("NOTE:" + text);
            log("Updating notes...");
        }

        function uploadImage() {
            const file = document.getElementById('imgPicker').files[0];
            if (!file) return log("Select a file first.");
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Fill white background (handles transparent PNGs)
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, 200, 200);
                    
                    // Aspect ratio fit (center crop)
                    const scale = Math.max(200 / img.width, 200 / img.height);
                    const x = (200 - img.width * scale) / 2;
                    const y = (200 - img.height * scale) / 2;
                    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                    
                    const imageData = ctx.getImageData(0, 0, 200, 200).data;
                    let bitmap = new Uint8Array(5000 + 4); // 5000 bytes for pixels + 4 for "IMG:"
                    bitmap.set(new TextEncoder().encode("IMG:"));

                    for (let i = 0; i < 40000; i++) {
                        // Luminance formula
                        const avg = 0.299 * imageData[i*4] + 0.587 * imageData[i*4+1] + 0.114 * imageData[i*4+2];
                        if (avg < 128) {
                            bitmap[4 + Math.floor(i/8)] |= (1 << (7 - (i%8)));
                        }
                    }
                    log("Uploading bitmap...");
                    await sendData(bitmap);
                    log("Image sync success!");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
